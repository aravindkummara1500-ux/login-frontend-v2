<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login App</title>
<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.box{
background:yellow;
padding:40px;
width:300px;
border-radius:8px;
text-align:center;
}
input{
width:90%;
padding:10px;
margin:10px 0;
}
button{
width:95%;
padding:10px;
background:#2a5298;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login 🚀</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Login</button>

<p>Aravind 2.0</p>

</div>

</body>
</html>
